services:
  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: patient_matching
      POSTGRES_USER: patient
      POSTGRES_PASSWORD: patient
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    ports:
      - "8001:8000"
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3001:3000"
    depends_on:
      - api

volumes:
  pgdata:
